<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>🎓 Student Dashboard</h1>

<p><b>User:</b> {{ user[1] }}</p>
<p><b>Average:</b> {{ avg }}</p>

<hr>

<h2>📊 Grades</h2>

<table border="1" cellpadding="10">
<tr>
    <th>Subject</th>
    <th>Grade</th>
</tr>

{% for g in grades %}
<tr>
    <td>{{ g[0] }}</td>
    <td>{{ g[1] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/logout">Logout 🚪</a>

</body>
</html>
